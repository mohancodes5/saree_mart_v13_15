{% extends "dashboard/base_dashboard.html" %}
{% block title %}Delete product{% endblock %}
{% block content %}
<div class="card card-dash p-4" style="max-width: 480px;">
  <h1 class="h5 mb-3">Delete product?</h1>
  <p class="text-muted">This will remove <strong>{{ object.name }}</strong> from your catalogue.</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'dashboard:stock' %}" class="btn btn-outline-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
