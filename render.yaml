# Render Blueprint: web service + Postgres for this Django app.
# In the Render Dashboard: New → Blueprint → connect this repo and apply.
# https://render.com/docs/infrastructure-as-code

databases:
  - name: saree-mart-db
    databaseName: saree_mart
    plan: free

services:
  - type: web
    name: saree-mart
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: saree-mart-db
          property: connectionString
