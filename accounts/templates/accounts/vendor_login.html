{% extends "base.html" %}
{% block title %}Vendor login{% endblock %}
{% block content %}
<div class="container py-5" style="max-width: 440px;">
  <h1 class="h4 fw-bold mb-4">Vendor login</h1>
  <p class="text-muted small">Access your seller dashboard</p>
  <div class="bg-white rounded-4 shadow-sm p-4 border">
    <form method="post" action="">
      {% csrf_token %}
      {% if form.non_field_errors %}
        <div class="alert alert-danger">{{ form.non_field_errors }}</div>
      {% endif %}
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <input type="hidden" name="next" value="{{ request.GET.next }}">
      <button type="submit" class="btn btn-ms-primary w-100 py-2 rounded-pill">Enter dashboard</button>
    </form>
    <p class="small text-muted mt-3 mb-0"><a href="{% url 'accounts:vendor_register' %}">Register as vendor</a> · <a href="{% url 'shop:home' %}">Back to store</a></p>
  </div>
</div>
{% endblock %}
