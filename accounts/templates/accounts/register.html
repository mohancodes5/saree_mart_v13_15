{% extends "base.html" %}
{% block title %}Sign up — Saree Store{% endblock %}
{% block content %}
<div class="container py-5" style="max-width: 440px;">
  <h1 class="h4 fw-bold mb-4">Create account</h1>
  <div class="bg-white rounded-4 shadow-sm p-4 border">
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
        <div class="mb-3">
          <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
          {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
          {{ field }}
        </div>
      {% endfor %}
      <button type="submit" class="btn btn-ms-primary w-100 py-2 rounded-pill">Sign up</button>
    </form>
    <p class="small text-muted mt-3 mb-0">Already have an account? <a href="{% url 'accounts:login' %}">Login</a></p>
  </div>
</div>
{% endblock %}
