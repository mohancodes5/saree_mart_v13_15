<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Site admin{% endblock %} — SareeMart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    body { background: #f1f5f9; min-height: 100vh; }
    .sa-sidebar { background: #0f172a; min-height: 100vh; width: 260px; }
    .sa-sidebar a { color: rgba(255,255,255,.85); text-decoration: none; display: block; padding: .65rem 1rem; border-radius: .5rem; }
    .sa-sidebar a:hover, .sa-sidebar a.active { background: rgba(255,255,255,.1); color: #fff; }
    .sa-brand { color: #fff; font-weight: 700; padding: 1rem 1rem 1.5rem; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  <div class="d-flex">
    <aside class="sa-sidebar d-none d-lg-block flex-shrink-0">
      <div class="sa-brand"><i class="fa-solid fa-shield-halved me-2"></i>Site admin</div>
      <nav class="px-2">
        <a href="{% url 'staff_admin:home' %}" class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}"><i class="fa-solid fa-house me-2"></i>Overview</a>
        <a href="{% url 'staff_admin:product_add' %}" class="{% if request.resolver_match.url_name == 'product_add' %}active{% endif %}"><i class="fa-solid fa-plus me-2"></i>Post saree</a>
        <a href="{% url 'staff_admin:categories' %}" class="{% if 'category' in request.resolver_match.url_name %}active{% endif %}"><i class="fa-solid fa-tags me-2"></i>Categories</a>
        <a href="{% url 'staff_admin:products' %}" class="{% if request.resolver_match.url_name == 'products' or request.resolver_match.url_name == 'product_edit' or request.resolver_match.url_name == 'product_delete' %}active{% endif %}"><i class="fa-solid fa-shirt me-2"></i>All products</a>
        <a href="{% url 'staff_admin:orders' %}" class="{% if request.resolver_match.url_name == 'orders' or request.resolver_match.url_name == 'order_status' %}active{% endif %}"><i class="fa-solid fa-receipt me-2"></i>All orders</a>
      </nav>
      <div class="px-3 pt-4 mt-4 border-top border-secondary">
        <a href="{% url 'shop:home' %}"><i class="fa-solid fa-store me-2"></i>View storefront</a>
        <a href="{% url 'staff_admin:logout' %}"><i class="fa-solid fa-right-from-bracket me-2"></i>Logout</a>
      </div>
    </aside>
    <div class="flex-grow-1 p-4">
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-{{ message.tags }} alert-dismissible fade show">{{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
        {% endfor %}
      {% endif %}
      {% block content %}{% endblock %}
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
