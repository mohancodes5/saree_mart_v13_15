{% extends "staff_admin/base_staff.html" %}
{% block title %}Categories{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1 class="h4 mb-0">Categories</h1>
  <a href="{% url 'staff_admin:category_add' %}" class="btn btn-dark rounded-pill">Add category</a>
</div>
<div class="bg-white rounded-3 border shadow-sm">
  <table class="table table-hover mb-0">
    <thead class="table-light"><tr><th>Name</th><th>Slug</th><th></th></tr></thead>
    <tbody>
      {% for c in categories %}
        <tr>
          <td>{{ c.name }}</td>
          <td><code>{{ c.slug }}</code></td>
          <td class="text-end">
            <a href="{% url 'staff_admin:category_edit' c.pk %}" class="btn btn-sm btn-outline-primary">Edit</a>
            <a href="{% url 'staff_admin:category_delete' c.pk %}" class="btn btn-sm btn-outline-danger">Delete</a>
          </td>
        </tr>
      {% empty %}
        <tr><td colspan="3" class="text-muted py-4 text-center">No categories.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
