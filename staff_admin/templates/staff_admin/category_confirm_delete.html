{% extends "staff_admin/base_staff.html" %}
{% block content %}
<div class="bg-white rounded-3 border p-4 shadow-sm" style="max-width: 420px;">
  <h1 class="h5 mb-3">Delete category?</h1>
  <p class="text-muted">{{ object.name }}</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'staff_admin:categories' %}" class="btn btn-outline-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
