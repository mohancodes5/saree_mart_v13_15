<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: system-ui, sans-serif; color: #2d2d2d; line-height: 1.5; max-width: 560px; margin: 0 auto; padding: 24px;">
  <p style="font-size: 18px; color: #7a1934; font-family: Georgia, serif;">SareeMart</p>
  <p>Hi {{ order.full_name }},</p>
  <p>Your order <strong>#{{ order.pk }}</strong> has been updated.</p>
  <p><strong>New status:</strong> {{ order.get_status_display }}</p>
  <p style="font-size: 14px; color: #6c6c6c;">Previous: {{ previous_label }}</p>
  <p style="margin-top: 20px;"><strong>Total:</strong> ₹{{ order.total_price }}</p>
  <p style="font-size: 13px; color: #6c6c6c; margin-top: 28px;">Thank you for shopping with SareeMart.</p>
</body>
</html>
